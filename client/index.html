<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── App Info ─────────────────────────────────────────────────────────── -->
    <title>Medico Guidance — AI Medicine Safety</title>
    <meta name="description" content="AI-powered medicine safety platform for Pakistan. Search medicines, check drug interactions, detect fake medicines and get WhatsApp reminders." />
    <meta name="theme-color" content="#2563eb" />

    <!-- ── PWA Manifest ─────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ──────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── iOS PWA support ──────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MedicoGuidance" />

    <!-- ── Open Graph (for sharing) ─────────────────────────────────────────── -->
    <meta property="og:title" content="Medico Guidance" />
    <meta property="og:description" content="AI-powered medicine safety platform for Pakistan" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Register Service Worker ──────────────────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ Service Worker registered'))
            .catch(err => console.log('❌ SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
